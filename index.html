    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Validação Forum</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <link rel="stylesheet" href="style.css">
    </head>
    <body>

        <img src="assets/images/414aa264cf3bac02aad560ae14173e69 (1).jpg" class="img-fluid" alt="">

    <div class="container p-5 text-center d-flex justify-content-center  rounded-4 position-absolute top-40 start-50 translate-middle" id="">
        
            <div class="col-md-6 p-5 gap-2">
            <form id="cadastro">
                <div>
                    <img src="assets/images/login.png" width="300" alt="">
                </div>
                <div>
                    <label class="form-label" for="usuario"></label>
                    <input type="text" id="usuario" class="form-control border border-black mt-1 p-3" placeholder="Usuário">
                    <div class="invalid-feedback">
                        Usuário incorreto.
                    </div>
                </div>
                <div>
                    <label for="senha" class="form-label" ></label>
                    <input type="password" id="senha" class="form-control border border-black mt-3 p-3" placeholder="Senha">
                    <div class="invalid-feedback">
                        Senha incorreto.
                    </div>
                </div>
                <div class="d-grid gap-2">
                <button class="btn btn-dark mt-3 p-3 rounded-0" type="submit">Entrar</button>
                </div>
            </form>
            
        </div>

    </div>

    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"  integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>   
    </body>
    <script src="scripts/script.js"></script>
    </html>
