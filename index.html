    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Validação Forum</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <link rel="stylesheet" href="style.css">
    </head>
<body>

<div class="login-area d-flex align-items-center overflow-hidden">
    
    <img src="assets/images/abstrato.png" class="bg-layer" id="img-direita">
    <img src="assets/images/abstrato.png" class="bg-layer" id="img-esquerda">
    
    <div class="container container-login">
        <div class="justify-content-end">
            <div class="">
                <div class="login-box text-center">
                    <img src="assets/images/login.png" width="200" class="mb-4 img-fluid" alt="Logo">
                    <form id="cadastro">
                        <div class="mb-3">
                            <input id="usuario" type="text" class="form-control-lg" placeholder="Usuário" required>
                        </div>
                        <div class="mb-3">
                            <input id="senha" type="password" class="form-control-lg" placeholder="Senha" required>
                        </div>
                        <button type="submit" class="btn btn-dark btn-lg shadow">Entrar</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

    
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"  integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>   
</body>
<script src="scripts/script.js"></script>
</html>
